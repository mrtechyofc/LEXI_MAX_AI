apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lexi-ingress
  namespace: lexi
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: lexi.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: lexi-frontend, port: { number: 3000 } } }
    - host: api.lexi.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: lexi-backend, port: { number: 8000 } } }
