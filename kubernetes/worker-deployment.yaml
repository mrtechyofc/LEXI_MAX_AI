apiVersion: apps/v1
kind: Deployment
metadata: { name: lexi-worker, namespace: lexi }
spec:
  replicas: 2
  selector: { matchLabels: { app: lexi-worker } }
  template:
    metadata: { labels: { app: lexi-worker } }
    spec:
      containers:
        - name: worker
          image: ghcr.io/yourorg/lexi-worker:latest
          envFrom:
            - configMapRef: { name: lexi-config }
            - secretRef:    { name: lexi-secrets }
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "2Gi" }
